<head><title>$cb</title></head>
<H1>$cb</H1>
<br>
<br>
The <b>$cb</b> identifier allows mIRC to return the contents of the Windows Clipboard (text).

<H4>Synopsis</H4>
<pre class ="code">
$cb
</pre>

<H4>Parameters</H4>
None

<H4>Properties</H4>
None

<H4>Example</H4>
Echo clipboard contents to the active window:
<pre class ="code">//echo -a $cb</pre>

<H4>Compatibility</H4>
Added: mIRC v3.5 (07 Aug 1995)

<H4>Notes</H4>
None

<H4>See also</H4>
<a href="cb_.html">$cb()</a><br>
